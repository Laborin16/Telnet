server {
    listen 80;
    server_name telnet-hillo.com www.telnet-hillo.com;

    # Certbot pone aquí el bloque de verificación
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás → redirigir a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name telnet-hillo.com www.telnet-hillo.com;

    # Certificados SSL (Certbot los genera en este path)
    ssl_certificate     /etc/letsencrypt/live/telnet-hillo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telnet-hillo.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Archivos estáticos del frontend (build de Vite)
    root /home/laborin/wisp-manager/frontend/dist;
    index index.html;

    # SPA: todas las rutas no encontradas → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Archivos estáticos del backend (comprobantes)
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # Subida de archivos (máx 10 MB)
    client_max_body_size 10M;
}

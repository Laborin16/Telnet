server {
    listen 80 default_server;
    server_name _;

    # Archivos estáticos del frontend (build de Vite)
    root /opt/wisp-manager/frontend/dist;
    index index.html;

    # SPA: todas las rutas no encontradas → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Archivos estáticos del backend (comprobantes)
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # Fotos de tareas servidas por el backend (StaticFiles montado en /media)
    location /media/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # Subida de archivos (máx 10 MB)
    client_max_body_size 10M;
}

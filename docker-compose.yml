services:

  backend:
    build: ./backend
    container_name: wisp-backend
    restart: always
    env_file: .env
    volumes:
      - ./backend/data:/app/data   # persiste la BD SQLite y comprobantes
    networks:
      - wisp-net

  nginx:
    build: ./frontend
    container_name: wisp-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # config editable sin rebuild
      - certbot-certs:/etc/letsencrypt:ro                        # certs SSL (ver paso 3)
      - certbot-www:/var/www/certbot                             # challenge certbot
    depends_on:
      - backend
    networks:
      - wisp-net

  # Servicio de SSL — solo se usa para obtener/renovar certificados
  # Ejecutar con: docker compose run --rm certbot certonly --webroot ...
  certbot:
    image: certbot/certbot
    container_name: wisp-certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    profiles:
      - ssl

volumes:
  certbot-certs:
  certbot-www:

networks:
  wisp-net:
    driver: bridge
